apiVersion: v2
name: homepage
description: A Helm chart for deploying gethomepage.dev on Kubernetes (kind) with HA, HPA, rolling updates and self-healing.
type: application
version: 1.0.0
appVersion: "latest"
keywords:
  - homepage
  - dashboard
  - kubernetes
home: https://gethomepage.dev
sources:
  - https://github.com/gethomepage/homepage
maintainers:
  - name: devops

dependencies:
  - name: victoria-metrics-k8s-stack
    version: "0.75.0"
    repository: https://victoriametrics.github.io/helm-charts
    condition: victoria-metrics-k8s-stack.enabled
  - name: loki-stack
    version: "2.10.3"
    repository: https://grafana.github.io/helm-charts
    condition: loki-stack.enabled
  - name: velero
    version: "12.0.1"
    repository: https://vmware-tanzu.github.io/helm-charts
    condition: velero.enabled
  - name: velero-ui
    version: "0.14.0"
    repository: https://helm.otwld.com/
    condition: velero-ui.enabled
