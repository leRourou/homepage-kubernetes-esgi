{{- if .Values.garage.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage-init
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garage-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage-init
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: garage-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage-init
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: garage-init
subjects:
- kind: ServiceAccount
  name: garage-init
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: garage-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage-init
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: garage-init
      containers:
      - name: init
        image: alpine:3.19
        command:
        - sh
        - -c
        - |
          set -eo pipefail
          apk add --no-cache curl jq kubectl -q 2>/dev/null

          NS={{ .Release.Namespace }}
          GARAGE_API="http://garage.${NS}.svc.cluster.local:3903"

          echo "==> Waiting for garage-0..."
          kubectl wait pod/garage-0 -n "${NS}" --for=condition=Ready --timeout=120s

          # ── Layout (via Garage CLI) ──────────────────────────────
          NODE_ID=$(kubectl exec garage-0 -n "${NS}" -- /garage status 2>/dev/null \
            | awk '/^[0-9a-f]/{print $1; exit}')
          echo "==> Node ID: ${NODE_ID}"

          LAYOUT_VER=$(kubectl exec garage-0 -n "${NS}" -- /garage layout show 2>/dev/null \
            | awk '/^Current cluster layout version:/{print $NF; exit}')
          LAYOUT_VER=${LAYOUT_VER:-0}
          echo "==> Current layout version: ${LAYOUT_VER}"

          if [ "${LAYOUT_VER}" = "0" ]; then
            echo "==> Assigning layout (zone=dc1, capacity=5G)..."
            kubectl exec garage-0 -n "${NS}" -- /garage layout assign -z dc1 -c 5G "${NODE_ID}"
            echo "==> Applying layout v1..."
            kubectl exec garage-0 -n "${NS}" -- /garage layout apply --version 1
          else
            echo "==> Layout already applied at v${LAYOUT_VER}, skipping."
          fi

          # ── Bucket (via Garage CLI) ──────────────────────────────
          echo "==> Creating bucket velero-backups..."
          kubectl exec garage-0 -n "${NS}" -- /garage bucket create velero-backups \
            && echo "    bucket created" || echo "    bucket already exists"

          # ── Key import (via admin HTTP API v1) ───────────────────
          echo "==> Importing S3 key ${KEY_ID}..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GARAGE_API}/v1/key/import" \
            -d "{\"accessKeyId\": \"${KEY_ID}\", \"secretAccessKey\": \"${SECRET_KEY}\", \"name\": \"velero-key\"}" \
            && echo "    key imported" || echo "    key may already exist"

          # ── Bucket permissions (via admin HTTP API v1) ───────────
          echo "==> Fetching bucket ID..."
          BUCKET_ID=$(curl -sf \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${GARAGE_API}/v1/bucket?globalAlias=velero-backups" | jq -r '.id')
          echo "==> Bucket ID: ${BUCKET_ID}"

          echo "==> Granting read/write/owner on velero-backups..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GARAGE_API}/v1/bucket/allow" \
            -d "{\"bucketId\": \"${BUCKET_ID}\", \"accessKeyId\": \"${KEY_ID}\", \
                 \"permissions\": {\"read\": true, \"write\": true, \"owner\": true}}" \
            && echo "    permissions granted" || echo "    already set"

          echo "==> Garage initialization complete!"
        env:
        - name: ADMIN_TOKEN
          value: {{ .Values.garage.config.adminToken | quote }}
        - name: KEY_ID
          value: {{ .Values.garage.veleroKey.accessKeyId | quote }}
        - name: SECRET_KEY
          value: {{ .Values.garage.veleroKey.secretAccessKey | quote }}
{{- end }}
