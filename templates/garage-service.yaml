{{- if .Values.garage.enabled }}
# Headless service for StatefulSet pod DNS (garage-0.garage-headless.<ns>.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: garage-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: garage
  ports:
  - name: rpc
    port: 3901
    targetPort: rpc
---
# ClusterIP service for S3 API + admin API access
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: garage
  ports:
  - name: s3
    port: 3900
    targetPort: s3
  - name: rpc
    port: 3901
    targetPort: rpc
  - name: admin
    port: 3903
    targetPort: admin
{{- end }}
