{{- if .Values.garage.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: garage-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage-init
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init
        image: alpine:3.19
        command:
        - sh
        - -c
        - |
          set -e
          apk add --no-cache curl jq -q

          NS={{ .Release.Namespace }}
          GARAGE_API="http://garage.${NS}.svc.cluster.local:3903"

          echo "==> Waiting for Garage admin API..."
          ATTEMPTS=0
          while true; do
            STATUS=$(curl -sf -H "Authorization: Bearer ${ADMIN_TOKEN}" "${GARAGE_API}/v1/status" 2>/dev/null) && break
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ "${ATTEMPTS}" -ge 60 ]; then
              echo "ERROR: Garage API not available after 120s"
              exit 1
            fi
            sleep 2
          done
          echo "==> Garage API ready"

          NODE_ID=$(echo "${STATUS}" | jq -r '.node')
          echo "==> Node ID: ${NODE_ID}"

          LAYOUT_VER=$(curl -sf \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${GARAGE_API}/v1/layout" | jq -r '.version // 0')
          echo "==> Current layout version: ${LAYOUT_VER}"

          if [ "${LAYOUT_VER}" = "0" ]; then
            echo "==> Assigning layout (zone=dc1, capacity=5GiB)..."
            curl -sf -X POST \
              -H "Authorization: Bearer ${ADMIN_TOKEN}" \
              -H "Content-Type: application/json" \
              "${GARAGE_API}/v1/layout" \
              -d "[{\"id\": \"${NODE_ID}\", \"zone\": \"dc1\", \"capacity\": 5368709120}]"

            echo "==> Applying layout v1..."
            curl -sf -X POST \
              -H "Authorization: Bearer ${ADMIN_TOKEN}" \
              -H "Content-Type: application/json" \
              "${GARAGE_API}/v1/layout/apply" \
              -d "{\"version\": 1}"
          else
            echo "==> Layout already applied at v${LAYOUT_VER}, skipping."
          fi

          echo "==> Creating bucket velero-backups..."
          curl -s -X POST \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GARAGE_API}/v1/bucket" \
            -d '{"globalAlias": "velero-backups"}' \
            && echo "    bucket created" || echo "    bucket may already exist"

          echo "==> Importing S3 key ${KEY_ID}..."
          curl -s -X POST \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GARAGE_API}/v1/key/import" \
            -d "{\"accessKeyId\": \"${KEY_ID}\", \"secretAccessKey\": \"${SECRET_KEY}\", \"name\": \"velero-key\"}" \
            && echo "    key imported" || echo "    key may already exist"

          echo "==> Fetching bucket ID..."
          BUCKET_ID=$(curl -sf \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${GARAGE_API}/v1/bucket?globalAlias=velero-backups" | jq -r '.id')
          echo "==> Bucket ID: ${BUCKET_ID}"

          echo "==> Granting read/write/owner on velero-backups..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GARAGE_API}/v1/bucket/allow" \
            -d "{\"bucketId\": \"${BUCKET_ID}\", \"accessKeyId\": \"${KEY_ID}\", \
                 \"permissions\": {\"read\": true, \"write\": true, \"owner\": true}}" \
            && echo "    permissions granted" || echo "    already set"

          echo "==> Garage initialization complete!"
        env:
        - name: ADMIN_TOKEN
          value: {{ .Values.garage.config.adminToken | quote }}
        - name: KEY_ID
          value: {{ .Values.garage.veleroKey.accessKeyId | quote }}
        - name: SECRET_KEY
          value: {{ .Values.garage.veleroKey.secretAccessKey | quote }}
{{- end }}
