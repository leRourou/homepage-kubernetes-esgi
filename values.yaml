image:
  repository: ghcr.io/gethomepage/homepage
  tag: "latest"
  pullPolicy: IfNotPresent

allowedHosts: "homepage.localhost,homepage.homepage.svc.cluster.local,*"

# ──────────────────────────────────────────────
# Replicas
# ──────────────────────────────────────────────
replicaCount: 2

# ──────────────────────────────────────────────
# Service Account
# ──────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}

# ──────────────────────────────────────────────
# Service
# ──────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3000

# ──────────────────────────────────────────────
# Ingress
# ──────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: homepage.localhost
  annotations: {}
  tls:
    enabled: false
    secretName: homepage-tls

# ──────────────────────────────────────────────
# Sticky Sessions (nginx)
# ──────────────────────────────────────────────
stickySession:
  enabled: true
  cookieName: route
  cookieExpires: "172800" # 2 days

# ──────────────────────────────────────────────
# Ressources
# ──────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ──────────────────────────────────────────────
# HPA
# ──────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      pods: 2
      periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      pods: 2
      periodSeconds: 30

# ──────────────────────────────────────────────
# Affinity
# ──────────────────────────────────────────────
podAntiAffinity:
  # "preferred" (dev/kind) ou "required" (prod)
  mode: preferred

# ──────────────────────────────────────────────
# PodDisruptionBudget
# ──────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ──────────────────────────────────────────────
# Security Context
# ──────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# ──────────────────────────────────────────────
# Security Context
# ──────────────────────────────────────────────
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL

# ──────────────────────────────────────────────
# Probes
# ──────────────────────────────────────────────
probes:
  startup:
    failureThreshold: 12
    periodSeconds: 5
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

# ──────────────────────────────────────────────
# Homepage
# ──────────────────────────────────────────────
config:
  # settings.yaml
  settings: |
    title: Homepage des big boss
    theme: dark
    color: violet
    headerStyle: boxed
    target: _blank

  # services.yaml
  services: |
    - Monitoring:
        - Grafana:
            href: http://grafana.localhost
            description: Dashboards & visualisation
            icon: grafana.png
            widget:
              type: grafana
              url: http://homepage-grafana.homepage.svc.cluster.local
              username: admin
              password: adminchangeme
    - Dashboards homepage:
        - HPA Scaling homepage:
            href: http://grafana.localhost/d/homepage-hpa/hpa-scaling-homepage
            description: Réplicas & métriques HPA homepage en temps réel
            icon: grafana.png
        - Self-Healing homepage:
            href: http://grafana.localhost/d/homepage-self-healing/self-healing-homepage
            description: Résilience pods homepage & redémarrages
            icon: grafana.png
        - Cluster CPU & Mémoire:
            href: http://grafana.localhost/d/cluster-cpu-memory/cluster-cpu-memoire
            description: CPU et mémoire du cluster par noeud en temps réel
            icon: grafana.png
    - Logs:
        - Logs Homepage (Loki):
            href: http://grafana.localhost/d/loki-homepage/logs-homepage-loki
            description: Logs applicatifs en temps réel via Loki
            icon: loki.png
    - Backup:
        - Velero UI:
            href: http://velero-ui.localhost
            description: Interface web — lancer et suivre les backups Velero
            icon: velero.png

  # widgets.yaml
  widgets: |
    - resources:
        cpu: true
        memory: true
        label: System
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: Cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - grafana:
        url: http://homepage-grafana.homepage.svc.cluster.local
        username: admin
        password: adminchangeme

  # bookmarks.yaml
  bookmarks: |
    - Developer:
        - GitHub:
            - href: https://github.com
              icon: github.png
        - StackOverflow:
            - href: https://stackoverflow.com
              icon: stackoverflow.png
  kubernetes: |
    mode: cluster

nodeSelector: {}
tolerations: []
podAnnotations: {}

# ──────────────────────────────────────────────
# Test Loki — Job de vérification des logs
# ──────────────────────────────────────────────
lokiTest:
  enabled: false
  # Nombre de requêtes HTTP envoyées à homepage pour générer du trafic
  requestCount: 100

# ──────────────────────────────────────────────
# Velero UI — interface web pour backups Velero
# ──────────────────────────────────────────────
velero-ui:
  enabled: true

  configuration:
    general:
      veleroNamespace: "homepage"

  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: velero-ui.localhost
        paths:
          - path: /
            pathType: Prefix

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ──────────────────────────────────────────────
# victoria-metrics-k8s-stack
# ──────────────────────────────────────────────
victoria-metrics-k8s-stack:
  enabled: true

  # Désactivé sur kind (pas d'endpoint accessible)
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  vmsingle:
    spec:
      retentionPeriod: "15d"
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      storage:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - prometheus.localhost

  alertmanager:
    spec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      storage:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - alertmanager.localhost

  grafana:
    adminPassword: "adminchangeme"
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Viewer
      security:
        allow_embedding: true
      date_formats:
        default_timezone: Europe/Paris
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.localhost
    initChownData:
      enabled: false
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: http://homepage-loki.homepage.svc.cluster.local:3100
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000

# ──────────────────────────────────────────────
# loki-stack (Loki + Promtail)
# ──────────────────────────────────────────────
loki-stack:
  enabled: true

  loki:
    enabled: true
    isDefault: false
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    config:
      compactor:
        working_directory: /data/loki/boltdb-shipper-compactor
        shared_store: filesystem
        retention_enabled: true
      limits_config:
        enforce_metric_name: false
        retention_period: 168h
      chunk_store_config:
        max_look_back_period: 168h
    datasource:
      uid: "loki"
      jsonData: |
        maxLines: 1000

  promtail:
    enabled: true
    config:
      clients:
        - url: http://homepage-loki:3100/loki/api/v1/push
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  grafana:
    enabled: false  # Grafana géré par victoria-metrics-k8s-stack

# ──────────────────────────────────────────────
# Garage — object storage S3-compatible (backend Velero)
# ──────────────────────────────────────────────
garage:
  enabled: true

  image:
    repository: dxflrs/garage
    tag: v1.0.0

  persistence:
    meta:
      size: 1Gi
      storageClass: standard
    data:
      size: 5Gi
      storageClass: standard

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  config:
    region: garage
    # openssl rand -hex 32
    rpcSecret: "4425f5c26c5e11581d3223904324dcb5b5d5dfb14e5e7f35e38c595424f5f1e6"
    adminToken: "s3cr3t-g4r4g3-4dm1n-t0k3n-f0r-v3l3r0-backups"

  # Clé S3 pré-définie importée dans Garage par l'init Job
  veleroKey:
    accessKeyId: "GK31c2f218a2e44f485b86880a"
    secretAccessKey: "b397642d29bee6bc5d2b2bba36cb9ca4f9f3f88f1a3ca3b12be3b4b26e16bba4"


# ──────────────────────────────────────────────
# Velero — sauvegarde Kubernetes (livrable ESGI)
# ──────────────────────────────────────────────
velero:
  enabled: true

  # Pas de snapshots de volumes (kind sans CSI snapshotter)
  snapshotsEnabled: false
  deployNodeAgent: false

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  # Plugin AWS pour le backend S3-compatible (Garage)
  initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
    - mountPath: /target
      name: plugins

  configuration:
    backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      default: true
      config:
        region: garage
        s3ForcePathStyle: "true"
        s3Url: http://garage.homepage.svc.cluster.local:3900
    volumeSnapshotLocation: []

  credentials:
    useSecret: true
    existingSecret: velero-s3-credentials

  # Backup quotidien du namespace homepage, rétention 30j
  schedules:
    homepage-daily:
      disabled: false
      schedule: "0 2 * * *"
      template:
        includedNamespaces:
        - homepage
        ttl: "720h0m0s"
        storageLocation: default

    # Backup horaire, rétention 48h
    homepage-hourly:
      disabled: false
      schedule: "0 * * * *"
      template:
        includedNamespaces:
        - homepage
        ttl: "48h0m0s"
        storageLocation: default

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  upgradeCRDs: true

# ──────────────────────────────────────────────
# Metrics Server
# ──────────────────────────────────────────────
metrics-server:
  enabled: true
  args:
    - --kubelet-insecure-tls
